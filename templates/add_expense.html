{% extends "layout.html" %}

{% block title %}Add Expense{% endblock %}

{% block content %}
<div class="card">
    <h3>Add Expense</h3>
    
    <form action="/add_expense" method="POST">
        <div style="margin-bottom: 15px;">
            <label for="category_id" style="display: block; font-weight: bold; margin-bottom: 5px;">Category:</label>
            <select name="category_id" id="category_id" required 
                    style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <option value="1">Food & Dining</option>
                <option value="2">Transportation</option>
                <option value="3">Entertainment</option>
                <option value="4">Rent/Utilities</option>
                <option value="5">Health & Fitness</option>
                <option value="6">Education</option>
                <option value="7">Shopping</option>
                <option value="8">Travel</option>
                <option value="9">Other</option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label for="amount" style="display: block; font-weight: bold; margin-bottom: 5px;">Amount ($):</label>
            <input type="number" step="0.01" min="0.01" name="amount" id="amount" 
                   placeholder="0.00" required 
                   style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box;">
        </div>

        <button type="submit" 
                style="background-color: var(--uf-blue); color: white; border: none; padding: 12px 20px; 
                       border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;">
            Save Expense
        </button>
    </form>
    
    <p style="margin-top: 15px; text-align: center;">
        <a href="/view_expenses" class="cta-link">← Back to List</a>
    </p>
</div>
{% endblock %}
