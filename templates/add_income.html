{% extends "layout.html" %}

{% block title %}Add Income{% endblock %}

{% block content %}
<div class="card">
    <h2>Add Income</h2>
    <form method="POST" action="{{ url_for('add_income') }}">
        <label>Income Source (e.g., Salary, Refund):</label>
        <input type="text" name="source" placeholder="Where is this money from?" required>
        
        <label>Amount ($):</label>
        <input type="number" step="0.01" name="amount" placeholder="0.00" required>
        
        <button type="submit">Save Income</button>
    </form>
</div>

{% endblock %}
