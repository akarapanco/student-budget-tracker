<!DOCTYPE html>
<html>
<body>
    <h2>Add Income</h2>
    <form method="POST">
        <label>Income Source (ex. Salary):</label><br>
        <input type="text" name="source" required><br><br>
        
        <label>Amount:</label><br>
        <input type="number" step="0.01" name="amount" required><br><br>
        
        <button type="submit">Save Income</button>
    </form>
</body>
</html>
