{% extends "layout.html" %}
{% block title %}Edit Expense{% endblock %}

{% block content %}
<div class="card">
    <h2>Edit Expense Entry</h2>
    <form action="/edit_expense/{{ expense.expense_id }}" method="POST">
        <label for="category_id">Category:</label>
        <select name="category_id" id="category_id" required>
            <option value="1" {% if expense.category_id == 1 %}selected{% endif %}>Food & Dining</option>
            <option value="2" {% if expense.category_id == 2 %}selected{% endif %}>Transportation</option>
            <option value="3" {% if expense.category_id == 3 %}selected{% endif %}>Entertainment</option>
            <option value="4" {% if expense.category_id == 4 %}selected{% endif %}>Rent/Utilities</option>
            <option value="5" {% if expense.category_id == 5 %}selected{% endif %}>Health & Fitness</option>
            <option value="6" {% if expense.category_id == 6 %}selected{% endif %}>Education</option>
            <option value="7" {% if expense.category_id == 7 %}selected{% endif %}>Shopping</option>
            <option value="8" {% if expense.category_id == 8 %}selected{% endif %}>Travel</option>
            <option value="9" {% if expense.category_id == 9 %}selected{% endif %}>Other</option>
        </select>

        <label for="amount">Amount ($):</label>
        <input type="number" step="0.01" min="0.01" name="amount" id="amount" value="{{ expense.amount }}" required>

        <button type="submit">Update Expense</button>
        <p style="text-align: center; margin-top: 10px;"><a href="/view_expenses" class="cta-link">Cancel</a></p>
    </form>
</div>
{% endblock %}
