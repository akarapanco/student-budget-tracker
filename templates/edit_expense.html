<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
</head>
<body>
    <h2>Edit Expense Entry</h2>
    <form action="/edit_expense/{{ expense.expense_id }}" method="POST">
        
        <label for="category_id">Category:</label>
        <select name="category_id" id="category_id" required>
            <option value="1">Food & Dining</option>
            <option value="2">Transport</option>
            <option value="3">Entertainment</option>
            <option value="4">Rent/Utilities</option>
            <option value="5">Health & Fitness</option>
            <option value="6">Education</option>
            <option value="7">Shopping</option>
            <option value="8">Travel</option>
            <option value="9">Other</option>
        </select>
        <br><br>

        <label for="amount">Amount ($):</label>
        <input type="number" step="0.01" name="amount" id="amount" value="{{ expense.amount }}" required>
        <br><br>

        <button type="submit">Update Expense</button>
        <a href="/view_expenses">Cancel</a>
    </form>
</body>
</html>
