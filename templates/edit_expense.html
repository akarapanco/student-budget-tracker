{% extends "layout.html" %}
{% block title %}Edit Expense{% endblock %}

{% block content %}
<div class="card">
    <h2>Edit Expense Entry</h2>
    <form method="POST" action="{{ url_for('edit_expense', expense_id = expense[0]) }}">
        <label for="category">Category:</label>
        <input type="text" name="category" id="category" value="{{ expense[2] }}" required>

        <label for="amount">Amount ($):</label>
        <input type="number" step="0.01" min="0.01" name="amount" id="amount" value="{{ expense[3] }}" required>

        <button type="submit">Update Expense</button>
        <p style="text-align: center; margin-top: 10px;"><a href="/view_expenses" class="cta-link">Cancel</a></p>
    </form>
</div>
{% endblock %}
