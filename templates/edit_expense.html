{% extends "layout.html" %}
{% block title %}Edit Expense{% endblock %}

{% block content %}
<div class="card">
    <h2>Edit Expense</h2>
    <form method="POST" action="{{ url_for('edit_expense', expense_id=expense[0]) }}">
        <label>Item description:</label>
        <input type="text" name="description" value="{{ expense[5]|capitalize if expense[5] else '' }}" placeholder="Be specific">

        <label>Category:</label>
        <select name="category" required>
            <option value="Food & Dining" {% if expense[2] == 'Food & Dining' %}selected{% endif %}>Food & Dining</option>
            <option value="Transport" {% if expense[2] == 'Transport' %}selected{% endif %}>Transport</option>
            <option value="Entertainment" {% if expense[2] == 'Entertainment' %}selected{% endif %}>Entertainment</option>
            <option value="Rent/Utilities" {% if expense[2] == 'Rent/Utilities' %}selected{% endif %}>Rent/Utilities</option>
            <option value="Health & Fitness" {% if expense[2] == 'Health & Fitness' %}selected{% endif %}>Health & Fitness</option>
            <option value="Education" {% if expense[2] == 'Education' %}selected{% endif %}>Education</option>
            <option value="Shopping" {% if expense[2] == 'Shopping' %}selected{% endif %}>Shopping</option>
            <option value="Travel" {% if expense[2] == 'Travel' %}selected{% endif %}>Travel</option>
            <option value="Other" {% if expense[2] == 'Other' %}selected{% endif %}>Other</option>
        </select>

        <label>Amount ($):</label>
        <input type="number" step="0.01" min="0.01" name="amount" value="{{ expense[3] }}" required>

        <button type="submit">Update Expense</button>
        <p style="text-align:center; margin-top:10px;"><a href="/view_expenses" class="cta-link">Cancel</a></p>
    </form>
</div>
{% endblock %}
