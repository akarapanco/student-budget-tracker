<!DOCTYPE html>
<html>
<head>
    <title>Financial Overview</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h2>Financial Overview</h2>

    <p>Total Income: ${{ overview.total_income }}</p>
    <p>Total Expenses: ${{ overview.total_expenses }}</p>
    <p>Remaining Balance: ${{ overview.remaining }}</p>

    <br>
    <h3>Spending by Category</h3>
    {% if totals %}
        <canvas id="spendingChart" width="400" height="400"></canvas>
        <script>
            const ctx = document.getElementById('spendingChart').getContext('2d');
            const spendingChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: [{% for category, total in totals %}'{{ category }}',{% endfor %}],
                    datasets: [{
                        data: [{% for category, total in totals %}{{ total }},{% endfor %}],
                        backgroundColor: [
                            '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0',
                            '#9966FF', '#FF9F40', '#FF6384', '#C9CBCF', '#36A2EB'
                        ]
                    }]
                }
            });
        </script>
    {% else %}
        <p>No expenses logged yet.</p>
    {% endif %}

    <br>
    <a href="/spending_summary">View Summary</a> |
    <a href="/add_expense">Add Expense</a>
</body>
</html>
