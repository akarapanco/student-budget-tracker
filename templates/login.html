
{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 40px auto;">
    <h2 style="color: var(--uf-blue); text-align: center; margin-top: 0;">Login</h2>
    <p style="text-align: center; font-size: 0.9em; color: #666;">Sign in to access your budget.</p>

    <form method="POST">
        <label style="font-weight: bold; color: var(--uf-blue);">Username:</label>
        <input type="text" name="username" placeholder="Enter your username" required>

        <label style="font-weight:bold; color: var(--uf-blue);">Password:</label>
        <input type="password" name="password" placeholder="Enter your password" required>
        <button type="submit">Login</button>
    </form>

    <div style="margin-top: 20px; text-align: center; border-top: 1px solid #eee; padding-top: 15px;">
        <span style="font-size: 0.9em; color: #666;">Don't have an account?</span><br>
        <a href="{{ url_for('register') }}" class="cta-link" style="font-weight: bold; text-decoration: none; color: var(--uf-orange);">Register here</a>
    </div>
</div>
{% endblock %}
